version: "3.9"

# All services share these environment variables injected from .env
x-common-env: &common-env
  env_file: .env
  environment:
    POSTGRES_HOST: postgres
    REDIS_HOST: redis
    PYBASEBALL_CACHE: /tmp/pybaseball_cache

x-app-base: &app-base
  build: .
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - mlruns:/app/mlruns
    - reports:/app/reports
    - pybaseball_cache:/tmp/pybaseball_cache
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  <<: *common-env

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prediction}
      POSTGRES_USER: ${POSTGRES_USER:-prediction_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prediction_app} -d ${POSTGRES_DB:-prediction}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application services ──────────────────────────────────────────────────
  api:
    <<: *app-base
    command: >
      gunicorn src.api.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers ${API_WORKERS:-2}
      --timeout 120
      --access-logfile -
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    <<: *app-base
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,high_priority
    healthcheck:
      test: ["CMD", "celery", "-A", "src.tasks.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3

  beat:
    <<: *app-base
    command: celery -A src.tasks.celery_app beat --loglevel=info
    volumes:
      - mlruns:/app/mlruns
      - reports:/app/reports
      - pybaseball_cache:/tmp/pybaseball_cache

  notifier:
    <<: *app-base
    command: python -m src.notify.listener

  discord-bot:
    <<: *app-base
    command: python -m src.notify.discord_bot
    deploy:
      resources:
        reservations: {}

  # ── Reverse proxy ────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  mlruns:
  reports:
  pybaseball_cache:
  beat_schedule:
  caddy_data:
  caddy_config:
